# VPS-level Nginx config for codex-test.zcorw.xyz.
#
# Upstream layout:
# - FE-telegram-bot Docker edge publishes http://127.0.0.1:3100
# - FE-Daily-Runner publishes static daily pages under:
#   /var/www/codex-test-daily/
# - Question images are served by FE-telegram-bot web through /assets/fe-siken/
#
# Install example:
#   sudo cp /home/dev/FE/deploy/nginx/codex-test.zcorw.xyz.conf /etc/nginx/sites-available/codex-test.zcorw.xyz
#   sudo ln -s /etc/nginx/sites-available/codex-test.zcorw.xyz /etc/nginx/sites-enabled/codex-test.zcorw.xyz
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# TLS example:
#   sudo certbot --nginx -d codex-test.zcorw.xyz

upstream fe_quiz_edge {
  server 127.0.0.1:3100;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name codex-test.zcorw.xyz;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name codex-test.zcorw.xyz;

  ssl_certificate /etc/letsencrypt/live/codex-test.zcorw.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/codex-test.zcorw.xyz/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:CodexTestTLS:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 2m;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location = /daily {
    return 301 /daily/;
  }

  location /daily/ {
    alias /var/www/codex-test-daily/;
    index index.html;
    try_files $uri $uri/ =404;
  }

  location /telegram/webhook/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://fe_quiz_edge;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://fe_quiz_edge;
  }
}
